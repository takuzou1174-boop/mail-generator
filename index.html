<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Reply Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .preview-area { white-space: pre-wrap; min-height: 300px; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-6 text-slate-800">スマート返信ジェネレーター</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- 入力側 -->
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">受信したメール</label>
                    <textarea id="input-mail" class="w-full h-48 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="ここにメールを貼り付けてください"></textarea>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">返信スタンス</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="setStance('承諾')" class="stance-btn p-2 text-sm border rounded hover:bg-blue-50 transition">承諾する</button>
                        <button onclick="setStance('断る')" class="stance-btn p-2 text-sm border rounded hover:bg-red-50 transition">お断りする</button>
                        <button onclick="setStance('日程調整')" class="stance-btn p-2 text-sm border rounded hover:bg-green-50 transition">日程調整</button>
                        <button onclick="setStance('検討中')" class="stance-btn p-2 text-sm border rounded hover:bg-yellow-50 transition">検討・保留</button>
                    </div>
                </div>

                <button onclick="generateReply()" id="gen-btn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">
                    AIで返信文を作る
                </button>
            </div>

            <!-- プレビュー側 -->
            <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-medium text-slate-600">プレビュー</span>
                    <button onclick="copyText()" class="text-xs bg-slate-200 px-3 py-1 rounded hover:bg-slate-300">コピー</button>
                </div>
                <div id="output-area" class="preview-area text-slate-800 text-sm leading-relaxed"></div>
            </div>
        </div>

        <div class="mt-8 pt-6 border-t">
            <details class="text-xs text-slate-500">
                <summary>設定（APIキー）</summary>
                <input type="password" id="api-key" class="mt-2 w-full p-2 border rounded" placeholder="AIzaSyDcpiKxh1RnHfYQnH54KAAApN08tXcGwWs">
            </details>
        </div>
    </div>

    <script>
        // プレビュー環境で安定動作する最新モデルを指定
        const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent";
        let currentStance = "";

        function setStance(stance) {
            currentStance = stance;
            document.querySelectorAll('.stance-btn').forEach(b => {
                b.classList.remove('bg-blue-600', 'text-white');
                b.classList.add('bg-white', 'text-slate-700');
            });
            event.target.classList.remove('bg-white', 'text-slate-700');
            event.target.classList.add('bg-blue-600', 'text-white');
        }

        async function generateReply() {
            const mailText = document.getElementById('input-mail').value;
            const apiKey = document.getElementById('api-key').value || ""; 
            const outputArea = document.getElementById('output-area');
            const btn = document.getElementById('gen-btn');

            if (!mailText || !currentStance) {
                alert("メール入力とスタンス選択が必要です。");
                return;
            }

            btn.disabled = true;
            btn.textContent = "考え中...";
            outputArea.textContent = "生成しています...";

            const prompt = `あなたはプロのビジネスマンです。以下の受信メールに対して「${currentStance}」という立場で、失礼のない丁寧なビジネス返信メールを作成してください。本文のみを出力し、件名や署名は含めないでください。\n\n【受信メール】\n${mailText}`;

            try {
                const response = await fetch(`${API_URL}?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text || "返信文を生成できませんでした。";
                outputArea.textContent = resultText;
            } catch (err) {
                outputArea.textContent = "エラーが発生しました: " + err.message + "\n\n※APIキーの設定を確認してください。";
            } finally {
                btn.disabled =
